<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ビンゴ OCR 判定（FREEマス対応）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tesseract OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  background: #f5f5f5;
  padding: 10px;
  text-align: center;
}
video {
  width: 100%;
  max-width: 400px;
  border: 2px solid #333;
  background: black;
}
button {
  padding: 10px 16px;
  margin: 6px;
  font-size: 16px;
}
table {
  margin: 10px auto;
  border-collapse: collapse;
}
td {
  border: 1px solid #333;
  width: 60px;
  height: 60px;

  /* ✅ ここが重要 */
  padding: 0;
  text-align: center;
  vertical-align: middle;
}

td input {
  width: 100%;
  height: 100%;

  /* ✅ inputのズレを完全に消す */
  margin: 0;
  padding: 0;
  border: none;
  background: transparent;

  box-sizing: border-box;
  text-align: center;
  font-size: 20px;
}
td input:disabled {
  opacity: 1;              /* disabledでも薄くしない */
  cursor: default;
}
.free {
  background: #ffe680;
}
#result {
  font-size: 22px;
  font-weight: bold;
  margin-top: 10px;
}
/* 抽選済み番号（ヒット） */
.hit {
  background: #fff3b0; /* 黄色 */
  font-weight: bold;
}

/* ビンゴライン（最優先） */
.line-bingo {
  background: #ff6666;
  color: #000;
  font-weight: bold;
}

td.selected {
  box-shadow: inset 0 0 0 3px #007bff;
}

/* Chrome / Edge / Safari */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Firefox */
input[type="number"] {
  -moz-appearance: textfield;
}

</style>
</head>

<body>

<h2>📸 ビンゴ OCR 判定（FREE対応）</h2>

<button onclick="startCamera()">① カメラ起動</button><br>
<video id="video" autoplay playsinline></video><br>
<button onclick="capture()">② 撮影してOCR</button>

<canvas id="canvas" hidden></canvas>

<h3>③ ビンゴカード（修正可）</h3>
<table id="bingo"></table>

<h3>🔧 カード位置補正</h3>
<button onclick="shiftCard(-1, 0)">⬅ 左</button>
<button onclick="shiftCard(1, 0)">➡ 右</button>
<button onclick="shiftCard(0, -1)">⬆ 上</button>
<button onclick="shiftCard(0, 1)">⬇ 下</button>

<h3>🔧 部分ずらし補正</h3>
<button onclick="shiftFromSelectedRightFlowDown()">
  ▶ 選択位置から右へ（下に流す）
</button>


<h3>④ 抽選済み番号</h3>

<input id="calledInput" type="number"
  min="1" max="75"
  placeholder="番号"
  style="width:120px; font-size:18px;">


<button onclick="addCalledNumber()">追加</button>

<div id="calledList" style="margin-top:8px; font-size:16px;"></div>

<br>
<button onclick="checkBingo()">✅ 判定</button>

<div id="result"></div>

<script>
const video = document.getElementById("video");
let stream = null;
let calledNumbers = [];
let selectedCell = null;

// ビンゴ表生成
const table = document.getElementById("bingo");
const cells = [];

for (let r = 0; r < 5; r++) {
  const tr = document.createElement("tr");
  cells[r] = [];
  for (let c = 0; c < 5; c++) {
    const td = document.createElement("td");
    const input = document.createElement("input");

// クリックされたマスを記録
td.addEventListener("click", () => {
  selectedCell = { r, c };
  highlightSelected(r, c);
});


    // FREEマス（中央）
    if (r === 2 && c === 2) {
      input.value = "FREE";
      input.disabled = true;
      input.className = "free";
    } else {
      input.type = "number";
      input.min = 1;
      input.max = 75;
      input.classList.add("hide-spin");
    }

    td.appendChild(input);
    tr.appendChild(td);
    cells[r][c] = input;
  }
  table.appendChild(tr);
}

// カメラ起動
function startCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  }).then(s => {
    stream = s;
    video.srcObject = stream;
  }).catch(err => alert("カメラ起動失敗: " + err.message));
}

// OCR実行
function capture() {
  if (!stream) {
    alert("先にカメラを起動してください");
    return;
  }

  // ✅ 再撮影時に色・結果をリセット
  clearHighlights();
  document.getElementById("result").innerText = "";

  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  Tesseract.recognize(canvas, "eng", {
    tessedit_char_whitelist: "0123456789"
  }).then(({ data }) => {

    console.log("OCR結果:", data.text);

    const nums = data.text.match(/\d+/g) || [];

    // FREE以外をクリア
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        if (!(r === 2 && c === 2)) {
          cells[r][c].value = "";
        }
      }
    }

    // 取れた分だけ表示
    let index = 0;
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        if (r === 2 && c === 2) continue; // FREE
        if (index >= nums.length) return;
        cells[r][c].value = nums[index++];
      }
    }
  });
}

// ビンゴ判定（FREE常時ヒット）
function checkBingo() {
  const called = calledNumbers;

  const hit = Array.from({ length: 5 }, () => Array(5).fill(false));

  clearHighlights();

  // ヒット判定（FREE含む）
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) {
        hit[r][c] = true; // FREE
      } else {
        const v = parseInt(cells[r][c].value);
        if (!isNaN(v) && called.includes(v)) {
          hit[r][c] = true;
          cells[r][c].classList.add("hit"); // ← 黄色
        }
      }
    }
  }

  let bingo = false;

  // 横ライン
  for (let r = 0; r < 5; r++) {
    if (hit[r].every(v => v)) {
      bingo = true;
      for (let c = 0; c < 5; c++) {
        cells[r][c].classList.add("line-bingo");
      }
    }
  }

  // 縦ライン
  for (let c = 0; c < 5; c++) {
    if (hit.map(r => r[c]).every(v => v)) {
      bingo = true;
      for (let r = 0; r < 5; r++) {
        cells[r][c].classList.add("line-bingo");
      }
    }
  }

  // 斜め（左上 → 右下）
  if ([0,1,2,3,4].every(i => hit[i][i])) {
    bingo = true;
    for (let i = 0; i < 5; i++) {
      cells[i][i].classList.add("line-bingo");
    }
  }

  // 斜め（右上 → 左下）
  if ([0,1,2,3,4].every(i => hit[i][4 - i])) {
    bingo = true;
    for (let i = 0; i < 5; i++) {
      cells[i][4 - i].classList.add("line-bingo");
    }
  }

  document.getElementById("result").innerText =
    bingo ? "🎉 BINGO！" : "❌ まだビンゴではありません";
}

function clearHighlights() {
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      cells[r][c].classList.remove("hit", "line-bingo");
    }
  }
}

function addCalledNumber() {
  const input = document.getElementById("calledInput");
  const value = parseInt(input.value);

  if (isNaN(value)) return;

  // 重複防止
  if (!calledNumbers.includes(value)) {
    calledNumbers.push(value);
  }

  input.value = "";      // 入力欄クリア
  updateCalledList();    // 表示更新
}

function updateCalledList() {
  document.getElementById("calledList").innerText =
    "現在の抽選番号: " + calledNumbers.join(", ");
}

function shiftCard(dx, dy) {
  // 現在の値を退避
  const temp = Array.from({ length: 5 }, () => Array(5).fill(""));

  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (r === 2 && c === 2) continue; // FREE
      temp[r][c] = cells[r][c].value;
    }
  }

  // 一旦クリア
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      if (!(r === 2 && c === 2)) {
        cells[r][c].value = "";
      }
    }
  }

  // ずらして再配置
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 5; c++) {
      const nr = r + dy;
      const nc = c + dx;

      if (nr < 0 || nr > 4 || nc < 0 || nc > 4) continue;
      if (nr === 2 && nc === 2) continue;

      cells[nr][nc].value = temp[r][c];
    }
  }
}

function shiftFromSelectedRightFlowDown() {
  if (!selectedCell) {
    alert("ずらす起点のマスを選択してください");
    return;
  }

  const { r, c } = selectedCell;

  // FREEを除いたセル座標リストを作成
  const positions = [];
  for (let i = 0; i < 5; i++) {
    for (let j = 0; j < 5; j++) {
      if (!(i === 2 && j === 2)) {
        positions.push({ r: i, c: j });
      }
    }
  }

  // 選択セルの index を取得
  const startIndex = positions.findIndex(
    p => p.r === r && p.c === c
  );
  if (startIndex === -1) return;

  // 起点以降の値を取得
  const values = positions
    .slice(startIndex)
    .map(p => cells[p.r][p.c].value);

  // 1つ右へ（先頭に空を入れる）
  values.unshift("");
  values.pop(); // 末尾は自然に下へ流れる

  // 再配置
  for (let i = 0; i < values.length; i++) {
    const pos = positions[startIndex + i];
    cells[pos.r][pos.c].value = values[i];
  }
}

function highlightSelected(r, c) {
  const tds = document.querySelectorAll("#bingo td");
  tds.forEach(td => td.classList.remove("selected"));

  table.rows[r].cells[c].classList.add("selected");
}
</script>

</body>
</html>
